version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: statuspulse-db
    environment:
      POSTGRES_DB:       statuspulse
      POSTGRES_USER:     statuspulse
      POSTGRES_PASSWORD: statuspulse123
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statuspulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: statuspulse-backend
    environment:
      DATABASE_URL: postgresql://statuspulse:statuspulse123@postgres:5432/statuspulse
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: statuspulse-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: statuspulse-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: statuspulse-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pg_data:
