apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: statuspulse
type: Opaque
stringData:
  POSTGRES_DB: statuspulse
  POSTGRES_USER: statuspulse
  POSTGRES_PASSWORD: statuspulse123
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: statuspulse
spec:
  clusterIP: None        # headless — required for StatefulSet
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: statuspulse
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata   # avoids "lost+found" initdb issue
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "statuspulse"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "statuspulse"]
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
